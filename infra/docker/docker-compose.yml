services:
  load_balancer:
    container_name: loadbalancer
    image: traefik:v3.7
    restart: unless-stopped
    command:
      # EntryPoints
      - --entrypoints.http.address=:80

      - --entrypoints.https.address=:443
      - --entrypoints.https.http.tls=true

      - --entrypoints.ping.address=:8081
      - --entrypoints.metrics.address=:8082
      - --entrypoints.traefik.address=:8083

      # Providers 
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      
      # API & Dashboard 
      - --api.dashboard=true
      - --api.insecure=false
      
      # Ping endpoint
      - --ping=true
      - --ping.entrypoint=ping
      
      # Observability 
      - --log.level=INFO
      - --accesslog=true
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addServicesLabels=true

      # Timeouts
      - --serversTransport.forwardingTimeouts.dialTimeout=10s
      - --serversTransport.forwardingTimeouts.responseHeaderTimeout=10s
      
      # Load Balancing
      - --providers.docker.defaultRule=Host(`localhost`)
      
      # Config
      - --providers.file.filename=/etc/traefik/traefik_conf.yml
    labels:
      - traefik.enable=true
      
      # Dashboard
      - traefik.http.routers.dashboard.rule=Host(`localhost`)
      - traefik.http.routers.dashboard.entrypoints=traefik
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.tls=true
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ping >/dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
      - "8443:443"
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
    volumes:
      - ./certs:/etc/traefik/certs:ro
      - ./traefik/config.yml:/etc/traefik/traefik_conf.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dotnet-diagnostics-lab-service-public
      - dotnet-diagnostics-lab-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 512M

  api:
    image: dotnet-diagnostics-lab:latest
    restart: unless-stopped
    build:
      context: ../../src
      dockerfile: ./Dockerfile
    env_file:
      - .env
    labels:
      - traefik.enable=true

      # Router configuration
      - traefik.http.routers.api_service.rule=PathPrefix(`/dotnet-diagnostics-lab`)
      - traefik.http.routers.api_service.entrypoints=http
      - traefik.http.routers.api_service.tls=false

      # Service configuration
      - traefik.http.services.api_service.loadbalancer.server.port=8080
      - traefik.http.services.api_service.loadbalancer.server.scheme=http
      - traefik.http.services.api_service.loadbalancer.passhostheader=true
      - traefik.http.services.api_service.loadbalancer.healthcheck.path=/health?source=traefik
      - traefik.http.services.api_service.loadbalancer.healthcheck.port=8080
      - traefik.http.services.api_service.loadbalancer.healthcheck.scheme=http
      - traefik.http.services.api_service.loadbalancer.healthcheck.interval=15s
      - traefik.http.services.api_service.loadbalancer.healthcheck.timeout=3s

      # Middlewares definitions
      - traefik.http.middlewares.strip-prefix.stripprefix.prefixes=/dotnet-diagnostics-lab

      # Apply middlewares
      - traefik.http.routers.api_service.middlewares=strip-prefix
    depends_on:
      - dotnet_monitor
    volumes:
      - ./monitor-data/diag:/tmp/diag
    networks:
      - dotnet-diagnostics-lab-service-internal
      - dotnet-diagnostics-lab-service-public
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      replicas: 1
      mode: replicated
      resources:
        limits:
          cpus: '1'
          memory: '1024M'
        reservations:
          cpus: '1'
          memory: '1024M'

  dotnet_monitor:
    container_name: dotnet_monitor
    image: mcr.microsoft.com/dotnet/monitor:10
    restart: unless-stopped
    command:
      - collect
      - --no-auth
      - --diagnostic-port
      - /tmp/diag/dotnet-monitor.sock
    environment:
      - DOTNETMONITOR_DiagnosticPort__ConnectionMode=Listen
      - DOTNETMONITOR_DiagnosticPort__EndpointName=/tmp/diag/dotnet-monitor.sock
      - DOTNETMONITOR_Authentication__MonitorApiKey__Enabled=false
      - DOTNETMONITOR_Urls=http://*:52323
    ports:
      - "52323:52323"
      - "52325:52325"
    volumes:
      - ./monitor-data/diag:/tmp/diag
    networks:
      - dotnet-diagnostics-lab-service-public
      - dotnet-diagnostics-lab-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 512M

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/ready >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus-config.yml:/etc/prometheus/prometheus.yml
    networks:
      - dotnet-diagnostics-lab-service-public
      - dotnet-diagnostics-lab-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.50'
          memory: 256M

  grafana:
    container_name: grafana
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "grafana-cli", "plugins", "ls" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - "./grafana/provisioning/:/etc/grafana/provisioning/"
      - "./grafana/dashboards/:/var/lib/grafana/dashboards/"
    networks:
      - dotnet-diagnostics-lab-service-public
      - dotnet-diagnostics-lab-service-internal
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.50'
          memory: 256M

volumes:
  monitor-data:
  prometheus-data:

networks:
  dotnet-diagnostics-lab-service-public:
    driver: bridge
  dotnet-diagnostics-lab-service-internal:
    driver: bridge
    internal: true